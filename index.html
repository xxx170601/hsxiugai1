<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品溯源信息 - 宏盛皮革</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f5f0;
            padding: 20px;
        }
        .wrap {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(80, 60, 40, 0.1);
            overflow: hidden;
        }
        .top-bar {
            background: #5c4b3e;
            color: #fff;
            text-align: center;
            padding: 22px;
        }
        .top-bar h2 {
            font-size: 32px;
            letter-spacing: 2px;
        }
        .top-bar p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .main {
            padding: 25px;
        }
        .info-line {
            display: flex;
            padding: 11px 0;
            border-bottom: 1px solid #f0ebe4;
            justify-content: center;
            align-items: center;
        }
        .info-key {
            width: 105px;
            color: #5c4b3e;
            font-weight: 500;
            text-align: right;
            padding-right: 10px;
        }
        .info-val {
            flex: 1;
            color: #444;
            line-height: 1.5;
            text-align: center;
        }
        .file-link-inline {
            color: #8c7562;
            text-decoration: underline;
            margin-left: 8px;
        }
        .file-link-inline:hover {
            color: #5c4b3e;
        }
        .foot {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #aaa;
            background: #faf7f2;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top-bar">
            <h2>宏盛皮革</h2>
            <p>产品溯源信息查询</p >
        </div>
        <div class="main">
            <div class="info-line">
                <div class="info-key">系列名称</div>
                <div class="info-val">【黑牛系列】</div>
            </div>
            <div class="info-line">
                <div class="info-key">产品材质</div>
                <div class="info-val">头层牛皮</div>
            </div>
            <div class="info-line">
                <div class="info-key">产品厚度</div>
                <div class="info-val">2.2-2.5MM</div>
            </div>
            <div class="info-line">
                <div class="info-key">产品工艺</div>
                <div class="info-val">厚皮</div>
            </div>
            <div class="info-line">
                <div class="info-key">检测标准</div>
                <div class="info-val">欧标 <a href="检测报告.pdf " class="file-link-inline">检测报告.pdf</a ></div>
            </div>
            <div class="info-line">
                <div class="info-key">原皮产地</div>
                <div class="info-val">澳洲 <a href="报关单.pdf" class="file-link-inline">报关单.pdf</a ></div>
            </div>
            <div class="info-line">
                <div class="info-key">制造商</div>
                <div class="info-val">金岭皮革</div>
            </div>
            <div class="info-line">
                <div class="info-key">生产日期</div>
                <div class="info-val">2026-04-06</div>
            </div>
            <div class="info-line">
                <div class="info-key">销售单位</div>
                <div class="info-val">宏盛皮革</div>
            </div>
            <div class="info-line">
                <div class="info-key">采购单位</div>
                <div class="info-val">朝客创品</div>
            </div>
            <div class="info-line">
                <div class="info-key">销售单号</div>
                <div class="info-val">XH20260410043</div>
            </div>
            <div class="info-line">
                <div class="info-key">产品特点</div>
                <div class="info-val">2.2-2.5的加厚产品，中厚纹路，触感舒适，透气性好，冬暖夏凉，柔韧耐用</div>
            </div>
        </div>
        <div class="foot">
            本产品由宏盛提供 | 一物一码 来源可查
        </div>
    </div>
</body>
</html>
